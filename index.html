<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>MC GeoGuessr RP</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Quelques ajouts spécifiques pour le jeu qui complètent ton CSS */
        .game-container { display: grid; grid-template-columns: 1fr; gap: 28px; margin-top: 20px; }
        @media(min-width: 900px) { .game-container { grid-template-columns: 1fr 1fr; } }
        
        #panorama { width: 100%; height: 500px; border: 3px solid var(--black); border-bottom: 6px solid var(--cyan); background: var(--black); }
        #map { width: 100%; height: 500px; border: 3px solid var(--black); background: var(--offwhite); cursor: crosshair; }
        
        .score-board { background: var(--black); color: white; padding: 20px; text-align: center; margin-top: 20px; border: 3px solid var(--cyan); display: none; }
        .score-num { font-family: 'Clash Display', sans-serif; font-size: 48px; color: var(--cyan); }
    </style>
</head>
<body>

    <header class="mast">
        <div class="mast-center">
            <h1 class="art-title" style="margin-bottom: 0;">MC <em>GeoGuessr</em></h1>
            <p class="mast-tagline">Devine où tu es sur le serveur</p>
        </div>
    </header>

    <main class="section">
        <h2 class="section-title">Lieu #1 : Ouvre l'œil</h2>
        
        <div class="game-container">
            <div id="panorama"></div>
            
            <div id="map"></div>
        </div>

        <div id="scoreBoard" class="score-board">
            <p class="nav-label">Ton Score</p>
            <p class="score-num" id="scoreDisplay">0</p>
            <p style="font-family: 'Satoshi', sans-serif; margin-top:10px;">Distance : <span id="distanceDisplay">0</span> blocs</p>
            <button class="hero-btn" style="margin-top:20px;" onclick="location.reload()">Rejouer</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
