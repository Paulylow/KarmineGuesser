<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>KarmineGuesser</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header class="game-header">
        <div class="logo">Karmine<em>Guesser</em></div>
        <div class="game-stats">
            <div class="stat-box">
                <span class="stat-label">Temps</span>
                <span class="stat-value" id="timer-display">30</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Lieu</span>
                <span class="stat-value"><span id="round-display">1</span>/5</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="header-score">0</span>
            </div>
        </div>
    </header>

    <div id="panorama"></div>

    <div id="map-wrapper">
        <div class="map-hover-area" id="map-container">
            <div id="map"></div>
            <button id="guess-btn" class="guess-btn" disabled>Placer le point</button>
        </div>
    </div>

    <div id="result-overlay" class="overlay hidden"></div>

    <div id="result-modal" class="result-modal hidden">
        <h2 class="art-title">Résultat</h2>
        <p class="distance-text">Distance : <span id="distanceDisplay" class="cyan-text">0</span></p>
        <p class="score-num">+<span id="scoreDisplay">0</span> pts</p>
        <p class="waiting-text" id="waiting-msg">En attente des autres joueurs... (<span id="auto-next-timer">5</span>s)</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
